name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SermonIndex Node Software ${{ github.ref_name }}'
          releaseBody: 'Download the installer for your platform below.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SermonIndex-${{ matrix.label }}
          retention-days: 1
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            # Signed auto-updater artifacts (+ their .sig) — consumed by
            # publish-update.mjs to build the multi-platform latest.json.
            #
            # With `createUpdaterArtifacts: true` (Tauri v2 layout) ONLY macOS
            # gets a separate updater bundle (.app.tar.gz). Windows and Linux
            # RE-USE the installers already listed above and emit a bare .sig
            # beside them: nsis/*-setup.exe.sig, msi/*.msi.sig,
            # appimage/*.AppImage.sig. Missing these .sig files is what kept
            # windows-x86_64 / linux-x86_64 out of latest.json.
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            # v1Compatible layout — only produced if createUpdaterArtifacts is
            # ever switched to "v1Compatible"; ignored when absent.
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig
          if-no-files-found: ignore

  # After all platforms build, collect every installer and publish them to Bunny
  # under app/releases/<tag>/ with a manifest + download page. Runs only on tags.
  publish-to-bunny:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Publish installers to Bunny CDN
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_KEY: ${{ secrets.BUNNY_STORAGE_KEY }}
          BUNNY_STORAGE_HOST: ${{ secrets.BUNNY_STORAGE_HOST }}
          BUNNY_CDN_BASE: ${{ secrets.BUNNY_CDN_BASE }}
        run: node scripts/deploy-installers.mjs --version "${{ github.ref_name }}" --dir dist-artifacts

      # Build the multi-platform auto-update: discover every signed updater
      # artifact under dist-artifacts (mac arm64/x64, Windows, Linux), upload
      # them, and write ONE app/latest.json covering all of them. This is what
      # already-installed apps poll on launch. Purge app/latest.json afterwards.
      - name: Publish multi-platform auto-update to Bunny CDN
        env:
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_STORAGE_ZONE }}
          BUNNY_STORAGE_KEY: ${{ secrets.BUNNY_STORAGE_KEY }}
          BUNNY_STORAGE_HOST: ${{ secrets.BUNNY_STORAGE_HOST }}
          BUNNY_CDN_BASE: ${{ secrets.BUNNY_CDN_BASE }}
        run: node scripts/publish-update.mjs --version "${{ github.ref_name }}" --dir dist-artifacts --mode prompt --require-all

      # Purge the Bunny edge so users immediately see the new version instead of a
      # stale cached page. Re-fetches fresh copies of the update manifest, the
      # releases index, and the permanent download page.
      - name: Purge Bunny CDN cache
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_CDN_BASE: ${{ secrets.BUNNY_CDN_BASE }}
        run: |
          if [ -z "$BUNNY_API_KEY" ]; then echo "BUNNY_API_KEY not set — skipping purge"; exit 0; fi
          urls="${BUNNY_CDN_BASE}/app/latest.json ${BUNNY_CDN_BASE}/app/releases/releases.json ${BUNNY_CDN_BASE}/app/download/"
          for url in $urls; do
            enc=$(python3 -c "import urllib.parse,sys;print(urllib.parse.quote(sys.argv[1],safe=''))" "$url")
            echo "Purging $url"
            curl -s -X POST -H "AccessKey: $BUNNY_API_KEY" "https://api.bunny.net/purge?url=${enc}&async=false"
            echo
          done
